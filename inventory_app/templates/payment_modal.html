<div class="modal fade" id="paymentModal{{ sale.id }}" tabindex="-1" aria-labelledby="paymentModalLabel{{ sale.id }}" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content app-modal">
            <form method="post" action="{{ url_for('payments.add_payment', sale_id=sale.id) }}">
                <input type="hidden" name="next" value="{{ request.full_path if request.query_string else request.path }}">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="paymentModalLabel{{ sale.id }}">Add Payment</h5>
                        <div class="text-muted small">{{ sale.invoice_number }} | Pending Rs. {{ "%.2f"|format(sale.pending_amount) }}</div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Payment Amount</label>
                            <div class="input-group">
                                <span class="input-group-text">Rs.</span>
                                <input class="form-control" type="number" min="0.01" max="{{ sale.pending_amount }}" step="0.01" name="payment_amount" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Payment Method</label>
                            <select class="form-select" name="payment_method" required>
                                <option value="Cash">Cash</option>
                                <option value="UPI">UPI</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Payment Date</label>
                            <input class="form-control" type="date" name="payment_date" value="{{ today }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Payment Note</label>
                            <textarea class="form-control" rows="3" name="payment_note" placeholder="Receipt note, UPI reference, or staff remark"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Payment</button>
                </div>
            </form>
        </div>
    </div>
</div>
