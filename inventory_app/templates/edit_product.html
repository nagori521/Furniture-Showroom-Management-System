{% extends "base.html" %}

{% block title %}Edit Product | Vishal Bharat Furniture Works{% endblock %}
{% block page_title %}Edit Product{% endblock %}
{% block page_subtitle %}Update product information and showroom stock data.{% endblock %}

{% block content %}
<section class="panel form-panel">
    <form method="post" class="row g-3">
        <div class="col-md-6"><label class="form-label">Product Name</label><input class="form-control" name="name" value="{{ request.form.get('name', product.name) }}" required></div>
        <div class="col-md-6"><label class="form-label">Product Code</label><input class="form-control" value="{{ product.code }}" disabled></div>
        <div class="col-md-6"><label class="form-label">Category</label><input class="form-control" name="category" value="{{ request.form.get('category', product.category) }}" required></div>
        <div class="col-md-3"><label class="form-label">Price</label><input class="form-control" type="number" step="0.01" min="0" name="price" value="{{ request.form.get('price', product.price) }}" required></div>
        <div class="col-md-3"><label class="form-label">Quantity</label><input class="form-control" type="number" min="0" name="quantity" value="{{ request.form.get('quantity', product.quantity) }}" required></div>
        <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" rows="4" name="description">{{ request.form.get('description', product.description) }}</textarea></div>
        <div class="col-12 d-flex gap-2"><button class="btn btn-primary" type="submit">Update Product</button><a class="btn btn-outline-secondary" href="{{ url_for('products.list_products') }}">Cancel</a></div>
    </form>
</section>
{% endblock %}
